[tool.pytest.ini_options]
testpaths = ["game/tests", "tools/tests"]
pythonpath = [".", "game", "tools/src"]
markers = [
    "tc(id): Spec test case traceability marker — links test to a TC-ID in docs/specs/",
    "unit: Unit tests (fast, no I/O)",
    "integration: Integration tests (may perform file I/O)",
]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".git",
    ".pytest_cache",
    ".ruff_cache",
    "scripts",
    "tools",
    "game/src/config.py",
    "game/src/entities/base.py"
]

[tool.ruff.lint]
select = ["E", "F", "B", "I", "T20", "W", "UP", "PLR0915", "SIM", "PT", "RUF", "C90"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["T201"]
"scripts/test_*.py" = ["F841", "F401", "E402"]
"game/tests/**/*.py" = ["F841", "F401", "E402"]
"tools/tests/**/*.py" = ["F841", "F401", "E402"]

[tool.ruff.lint.pylint]
max-statements = 50

[tool.pyright]
include = ["game", "tools/src", "tools/tests"]
venvPath = "."
venv = "venv"
extraPaths = ["tools/src", "game"]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    "venv",
    "venv/**",
    "**/venv/**",
    "game/venv",
    "tools/venv",
    ".agents"
]
