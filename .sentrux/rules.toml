# Sentrux Architectural Rules — Project Template
# ================================================
# Installed by: .agents/tools/sentrux/installer.sh
# Docs: https://github.com/sentrux/sentrux
#
# Layer ordering convention:
#   lower order  = higher level (app/presentation, closer to user)
#   higher order = foundational (domain, shared types)
#   High layers (low order) may depend on foundational layers (high order).
#   NOT the reverse.
#
# Customize this file for your project's architecture.
# The [constraints] section applies globally; add [[layers]] and
# [[boundaries]] to match your package layout.

[constraints]
min_quality = 0.64       # Quality signal floor (6400/10000) — never drop below
max_cycles = 0           # Zero circular dependencies (ADP)
max_cc = 20              # Max cyclomatic complexity per function
max_fn_lines = 120       # Max function length
# L045: Sentrux free tier ignores exclude/sentruxignore. Lock files and
# large spec docs trigger false positives. Uncomment only if your project
# has no generated/vendor files, or if you have a paid Sentrux license.
# max_file_lines = 500   # No god files
# no_god_files = true     # Enforce modular structure

# ── Layer Definitions ──
# Lower order = higher layer (GUI). Higher order = foundational (core logic).

[[layers]]
name = "gui"
paths = ["tools/src/asset_convertor/gui/**"]
order = 0

[[layers]]
name = "exporters"
paths = ["tools/src/asset_convertor/exporters/**"]
order = 1

[[layers]]
name = "core"
paths = ["tools/src/asset_convertor/core/**"]
order = 2

# ── Boundary Rules ──

[[boundaries]]
from = "tools/src/asset_convertor/core/**"
to = "tools/src/asset_convertor/gui/**"
reason = "Core logic must not depend on GUI presentation"

[[boundaries]]
from = "tools/src/asset_convertor/core/**"
to = "tools/src/asset_convertor/exporters/**"
reason = "Core logic must not depend on exporters"

[[boundaries]]
from = "tools/src/asset_convertor/exporters/**"
to = "tools/src/asset_convertor/gui/**"
reason = "Exporters must not depend on GUI presentation"

