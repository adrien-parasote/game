terrains:
  grass:
    palette: forest_grass
    texture:
      type: noise
      scale: 0.12
      octaves: 3
      persistence: 0.5
      thresholds: [-0.2, 0.4, 0.8]
      # V2 params
      use_smooth_ramp: true
      detail_scale: 0.5
      detail_strength: 0.06
      use_dithering: true
    edge:
      style: organic
      width: 3
      noise_scale: 0.3
    detail:
      type: grass_blades
      density: 0.12
      max_height: 4
    border:
      shadow_width: 1
      highlight_width: 1

  dirt:
    palette: dry_dirt
    texture:
      type: noise
      scale: 0.2
      octaves: 2
      persistence: 0.6
      thresholds: [-0.2, 0.4, 0.8]
      use_smooth_ramp: true
      detail_scale: 0.4
      detail_strength: 0.05
      use_dithering: true
    edge:
      style: organic
      width: 2
      noise_scale: 0.25
    detail:
      type: dirt_specks
      density: 0.08

  paving_stone:
    palette: stone_path
    texture:
      type: stippled
      density: 0.5
    edge:
      style: straight
      width: 2
    detail:
      type: stone_cracks
      density: 0.05
      max_length: 4

  sand:
    palette: sand
    texture:
      type: noise
      scale: 0.1
      octaves: 2
      persistence: 0.4
      thresholds: [-0.2, 0.4, 0.8]
      use_smooth_ramp: true
      detail_scale: 0.6
      detail_strength: 0.04
      use_dithering: true
    edge:
      style: dithered
      width: 4
    detail:
      type: sand_grains
      density: 0.10

  snow:
    palette: snow
    texture:
      type: stippled
      density: 0.3
    edge:
      style: dithered
      width: 3
    detail:
      type: none

  water:
    palette: water
    texture:
      type: noise
      scale: 0.12
      octaves: 2
      use_smooth_ramp: true
      detail_scale: 0.3
      detail_strength: 0.04
      use_dithering: true
    edge:
      style: organic
      width: 2
    detail:
      type: none
    # Note: V1 = static water only. V2 adds animated frames.
