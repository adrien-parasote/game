name: Release Manager

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0.0

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
